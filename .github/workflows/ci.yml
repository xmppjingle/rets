name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['25', '26', '27']
    container:
      image: erlang:${{ matrix.otp }}
    steps:
      - uses: actions/checkout@v4

      - name: Compile
        run: rebar3 compile

      - name: Xref
        run: rebar3 xref

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: EUnit tests
        run: rebar3 eunit --module=rets_tests --verbose

      - name: Cover report
        run: rebar3 cover --verbose

  perf:
    runs-on: ubuntu-latest
    needs: test
    container:
      image: erlang:26
    steps:
      - uses: actions/checkout@v4

      - name: Performance tests
        run: rebar3 eunit --module=rets_perf_tests --verbose

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Docker build and test
        run: docker compose run --rm test
